name: build

# トリガー:
#  - main への push: 配布フォルダ (dist/k-file/) を zip 化して artifact 90日保存
#  - v* タグ: Release を作成し zip を assets に upload (β は prerelease)
#  - 手動実行 (workflow_dispatch) も可
#
# macOS (2026-07-10 〜): build-mac ジョブで Apple Silicon (arm64) 向け
# k-file.app を作り k-file-macos.zip として artifact / Release に upload。
# Intel Mac は対象外 (ユーザー実機が M1 のため)。署名/公証は未実施 —
# 初回起動は Gatekeeper 回避が必要 (docs/MAC.md 参照)。
#
# すべての push / PR / タグで、まず Linux で pytest (offscreen Qt) を実行し、
# 緑の時だけ Windows で .exe をビルドする (build は needs: test)。これで壊れた
# コミットが .exe 化され自動更新で配布される事故を防ぐ。
#
# 配布形態 (2026-05-25 〜): PyInstaller --onedir + zip 配布
#   --onefile では K-SystemZ から呼ぶたび 3〜10 秒の展開コストがかかるため。

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  # まず Linux で全テストを実行 (offscreen Qt)。緑でなければ build に進まない。
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install OS deps for PySide6 (offscreen Qt)
        # pip 版 PySide6 は libEGL/libGL 等を同梱しないため、headless でも
        # これらが無いと import 時に落ちる。offscreen プラットフォームで使う最小限。
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libegl1 libgl1 libxkbcommon0 libdbus-1-3

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Run tests (offscreen)
        env:
          QT_QPA_PLATFORM: offscreen
        run: python -m pytest -q

  build:
    needs: test          # テストが緑でなければ .exe ビルド / Release に進まない
    runs-on: windows-latest
    permissions:
      contents: write   # Releases upload に必要

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build (--onedir)
        run: pyinstaller --noconfirm k-file.spec

      - name: Pack distribution folder (+ SHA256)
        # dist/k-file/ フォルダごと zip 化 (展開先で k-file.exe を実行) し、
        # 自動更新の整合性検証用に SHA256 サイドカー (.sha256) を sha256sum 形式で出力。
        # アプリ側 (update_banner._verify_checksum) が展開前にこれと照合する。
        run: |
          Compress-Archive -Path dist/k-file/* -DestinationPath dist/k-file-windows.zip -Force
          $hash = (Get-FileHash -Algorithm SHA256 dist/k-file-windows.zip).Hash.ToLower()
          "$hash  k-file-windows.zip" | Out-File -FilePath dist/k-file-windows.zip.sha256 -Encoding ascii -NoNewline
        shell: pwsh

      - name: Install Inno Setup
        # ユーザー領域インストーラ (k-file-setup.exe) のビルドに使う。
        run: choco install innosetup --no-progress -y
        shell: pwsh

      - name: Build installer (k-file-setup.exe)
        # VERSION を src/__version__.py から読み取り /D で渡す。出力は dist/k-file-setup.exe。
        run: |
          # 行頭アンカー必須: docstring 内の例 (  例: ... VERSION = "..." ) も
          # 拾ってしまうため、実際の代入行 (行頭 VERSION) だけにマッチさせる。
          $ver = (Select-String -Path src/__version__.py -Pattern '^VERSION = "(.*)"').Matches[0].Groups[1].Value
          Write-Host "Building installer for version $ver"
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" /DMyAppVersion=$ver installer\k-file.iss
        shell: pwsh

      - name: Upload artifact (always)
        uses: actions/upload-artifact@v4
        with:
          name: k-file-windows
          path: |
            dist/k-file-windows.zip
            dist/k-file-windows.zip.sha256
            dist/k-file-setup.exe
          if-no-files-found: error
          retention-days: 90

      - name: Upload to GitHub Release (tagged push only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/k-file-windows.zip
            dist/k-file-windows.zip.sha256
            dist/k-file-setup.exe
          prerelease: ${{ contains(github.ref, '-beta.') || contains(github.ref, '-alpha.') }}

  # macOS (Apple Silicon) ビルド。Windows ビルドと同じくテスト緑が条件。
  build-mac:
    needs: test
    runs-on: macos-latest   # = arm64 (M1 以降)。Intel Mac は対象外
    permissions:
      contents: write   # Releases upload に必要

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build (.app bundle)
        run: pyinstaller --noconfirm k-file.spec

      - name: Pack distribution app (zip)
        # ditto を使う: .app 内部の symlink / 実行権限を壊さず zip 化できる
        # (普通の zip / Compress-Archive では Qt framework の symlink が壊れる)
        run: ditto -c -k --sequesterRsrc --keepParent dist/k-file.app dist/k-file-macos.zip

      - name: Upload artifact (always)
        uses: actions/upload-artifact@v4
        with:
          name: k-file-macos
          path: dist/k-file-macos.zip
          if-no-files-found: error
          retention-days: 90

      - name: Upload to GitHub Release (tagged push only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/k-file-macos.zip
          prerelease: ${{ contains(github.ref, '-beta.') || contains(github.ref, '-alpha.') }}
