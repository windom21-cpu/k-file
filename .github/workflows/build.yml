name: build

# トリガー:
#  - main への push: .exe を artifact として 90日保存 (Actions タブから DL)
#  - v* タグ: Release を作成し .exe を assets に upload (β は prerelease)
#  - 手動実行 (workflow_dispatch) も可

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write   # Releases upload に必要

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build .exe
        run: pyinstaller --noconfirm k-file.spec

      - name: Upload artifact (always)
        uses: actions/upload-artifact@v4
        with:
          name: k-file-windows
          path: dist/k-file.exe
          if-no-files-found: error
          retention-days: 90

      - name: Upload to GitHub Release (tagged push only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/k-file.exe
          prerelease: ${{ contains(github.ref, '-beta.') || contains(github.ref, '-alpha.') }}
